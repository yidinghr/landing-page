<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Home</title>

<style>

body{
    margin:0;
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial, Helvetica, sans-serif;
    transform: translateY(-120px);
}

.logo{
    width:260px;
    margin-bottom:40px;
}

.welcome{
    color:#f4d51f;
    font-size:80px;
    font-weight:900;
    margin-bottom:60px;
}

/* menu */

.menu{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:30px;
    width:600px;
}

.menu div{
    border:3px solid #f4d51f;
    color:#f4d51f;
    font-size:28px;
    font-weight:700;
    text-align:center;
    padding:20px 10px;
    cursor:pointer;
    transition:0.2s;
}

.menu div:hover{
    background:#1a1a1a;
}

.menu a{
    text-decoration:none;
}

/* GOOGLE SHEET OVERLAY */

.sheetPage{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:none;
    z-index:999;
}

/* khung căn giữa */

.sheetCenter{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:95vw;
    height:90vh;
    overflow:hidden;
    border:4px solid #f4d51f;
}

/* scale bảng */

.sheetCenter iframe{
    width:1400px;
    height:900px;
    border:none;

    transform:scale(0.8);
    transform-origin: center;
}

/* close button */

.closeBtn{
    position:absolute;
    top:20px;
    right:40px;
    color:#f4d51f;
    font-size:40px;
    cursor:pointer;
}

</style>

</head>

<body>

<img src="image/logo.png" class="logo">

<div class="welcome">
Welcome !
</div>

<div class="menu">

<div>員工名單狀態</div>

<a href="https://docs.google.com/spreadsheets/d/17PLHcxe9NaI4aTGgqv1EwwBYqcMmu7oq/preview">
<div>查看工作排班</div>
</a>

<div onclick="openSheet()">修改工作排班</div>

<div>員工打卡狀態</div>

</div>


<!-- GOOGLE SHEET PAGE -->

<div id="sheetPage" class="sheetPage">

<div class="closeBtn" onclick="closeSheet()">✕</div>

<div class="sheetCenter">

<iframe
src="https://docs.google.com/spreadsheets/d/1pKdVcLqjYl3vduHvgI8V3LTbPuzGDWsj/preview#gid=1844677567">
</iframe>

</div>

</div>


<script>

function openSheet(){
    document.getElementById("sheetPage").style.display="block";
}

function closeSheet(){
    document.getElementById("sheetPage").style.display="none";
}

</script>

</body>
</html>
