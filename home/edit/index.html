<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修改工作排班</title>
<link rel="icon" type="image/png" href="../../image/logoweb.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/source-han-vf@0.1.1/source-han-sans-vf.min.css">
<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/i18n.css">
<link rel="stylesheet" href="../../assets/css/edit-schedule.css">
</head>

<body class="edit-page" data-login-path="../../index.html" data-home-path="../home.html">
<div class="dashboard-galaxy" aria-hidden="true">
<canvas id="scheduleGalaxyCanvas" class="dashboard-galaxy__canvas" data-galaxy-canvas></canvas>
</div>
<div id="scheduleApp" class="schedule-app">
<main class="schedule-workspace">
<header class="schedule-header">
<div class="schedule-header__spacer" aria-hidden="true"></div>
<h1 id="scheduleHeaderTitle" class="schedule-header__title">班表</h1>
<div class="schedule-header__tools">
<button id="scheduleLegendToggle" type="button" class="schedule-header__tool" aria-expanded="false" aria-controls="scheduleLegendPanel" aria-label="班碼參照">&lt;&lt;</button>
<div id="scheduleLocaleMount" class="schedule-locale-slot"></div>
</div>
</header>

<section class="schedule-period-bar" aria-label="排班月份">
<div class="schedule-period-bar__inner">
<div class="schedule-period-bar__spacer" aria-hidden="true"></div>
<div class="schedule-period-grid">
<div class="schedule-period-pair schedule-period-pair--year">
<span id="scheduleYearLabel" class="schedule-period-pair__label">年</span>
<span class="schedule-period-pair__value">
<select id="scheduleYear" aria-label="年份"></select>
<span class="schedule-period-pair__arrow" aria-hidden="true">▾</span>
</span>
</div>

<div class="schedule-period-pair schedule-period-pair--month">
<span id="scheduleMonthLabel" class="schedule-period-pair__label">月</span>
<span class="schedule-period-pair__value">
<select id="scheduleMonth" aria-label="月份"></select>
<span class="schedule-period-pair__arrow" aria-hidden="true">▾</span>
</span>
</div>
</div>
<div class="schedule-period-actions">
<label class="schedule-code-entry">
<span id="scheduleCodeLabel" class="schedule-code-entry__label">Code</span>
<span class="schedule-code-entry__field">
<input id="scheduleSelectionInput" class="schedule-code-entry__input" type="text" inputmode="text" autocomplete="off" spellcheck="false" maxlength="8">
<div id="scheduleCodeDropdown" class="schedule-code-dropdown" hidden></div>
</span>
</label>
<button id="scheduleAddRowsButton" type="button" class="schedule-add-rows__button" aria-label="新增員工列">+</button>
<label class="schedule-add-rows">
<span id="scheduleAddRowsLabel" class="schedule-assistive">新增行</span>
<input id="scheduleAddRowsCount" class="schedule-add-rows__input" type="number" min="1" max="100" step="1" value="1" inputmode="numeric" aria-label="新增行數">
</label>
<button id="scheduleDeleteRowsButton" type="button" class="schedule-add-rows__button schedule-add-rows__button--delete" aria-label="刪除員工列">-</button>
</div>
</div>
</section>

<section class="schedule-sheet-frame">
<section id="scheduleFrozenLayer" class="schedule-frozen-layer" aria-hidden="true">
<div id="scheduleFrozenScroll" class="schedule-frozen-scroll">
<div id="scheduleFrozenZoom" class="schedule-frozen-zoom">
<div class="schedule-sheet-stage schedule-frozen-stage">
<div class="schedule-sheet-main schedule-frozen-main">
<table class="schedule-table schedule-frozen-table">
<thead id="scheduleFrozenTableHead"></thead>
</table>
</div>

<aside class="schedule-sheet-summary schedule-frozen-summary">
<table class="schedule-summary-table schedule-frozen-summary-table">
<thead id="scheduleFrozenSummaryHead"></thead>
</table>
</aside>
</div>
</div>
</div>
</section>

<div id="scheduleSheetScroll" class="schedule-sheet-scroll">
<div id="scheduleSheetZoom" class="schedule-sheet-zoom">
<div class="schedule-sheet-stage">
<div class="schedule-sheet-main">
<table id="scheduleTable" class="schedule-table">
<thead id="scheduleTableHead"></thead>
<tbody id="scheduleTableBody"></tbody>
</table>
</div>

<aside class="schedule-sheet-summary">
<table id="scheduleSummaryTable" class="schedule-summary-table">
<thead id="scheduleSummaryHead"></thead>
<tbody id="scheduleSummaryBody"></tbody>
</table>
</aside>

<section id="dailySummarySection" class="schedule-daily-stage" hidden>
<div class="schedule-daily-stage__main">
<table id="dailySummaryTable" class="schedule-daily-table">
<thead id="dailySummaryHead"></thead>
<tbody id="dailySummaryBody"></tbody>
</table>
</div>
<aside class="schedule-daily-stage__summary" aria-hidden="true">
<table id="dailySummarySpacerTable" class="schedule-daily-spacer-table">
<thead id="dailySummarySpacerHead"></thead>
<tbody id="dailySummarySpacerBody"></tbody>
</table>
</aside>
</section>
</div>
</div>
</div>

<div id="scheduleSelectionMeta" class="schedule-assistive" aria-live="polite"></div>
<div id="scheduleFeedback" class="schedule-feedback" role="status" aria-live="polite"></div>
</section>
</main>

<div class="schedule-corner-actions" aria-label="Schedule actions">
<button id="scheduleEditButton" type="button" class="schedule-corner-actions__button">EDIT</button>
<button id="scheduleSaveButton" type="button" class="schedule-corner-actions__button">SAVE</button>
<button id="scheduleExportButton" type="button" class="schedule-corner-actions__button" hidden>EXCEL</button>
</div>

<aside id="scheduleLegendPanel" class="schedule-legend" aria-label="班碼參照面板">
<div class="schedule-legend__head">
<h2 class="schedule-legend__title">班碼參照</h2>
<button id="scheduleLegendListToggle" type="button" class="schedule-legend__list-toggle" aria-expanded="false" aria-controls="scheduleLegendContent" aria-label="Toggle code list">▼</button>
</div>
<div id="scheduleLegendContent" class="schedule-legend__content" hidden>
<table id="scheduleLegendTable" class="schedule-legend-table">
<colgroup>
<col class="schedule-legend-col schedule-legend-col--code">
<col class="schedule-legend-col schedule-legend-col--in">
<col class="schedule-legend-col schedule-legend-col--out">
<col class="schedule-legend-col schedule-legend-col--pay">
<col class="schedule-legend-col schedule-legend-col--night">
<col class="schedule-legend-col schedule-legend-col--remark">
</colgroup>
<thead>
<tr class="schedule-legend-table__label-row">
<th>SHIFT CODE</th>
<th>CHECK IN TIME</th>
<th>CHECK OUT TIME</th>
<th>HOURS PAY</th>
<th>NIGHT SHIFT HOURS</th>
<th>REMARK</th>
</tr>
</thead>
<tbody id="scheduleLegendBody"></tbody>
</table>
</div>
<div class="schedule-legend__head schedule-legend__head--section">
<span class="schedule-legend__title">Cài đặt ngày lễ</span>
<button id="scheduleCalendarToggle" type="button" class="schedule-legend__list-toggle" aria-expanded="false" aria-label="Toggle calendar">▼</button>
</div>
<div id="scheduleCalendarContent" class="schedule-legend__calendar" hidden>
<div class="schedule-cal__bar">
<span class="schedule-cal__select-wrap">
<select id="scheduleCalYear" class="schedule-cal__select" aria-label="Year"></select>
<span class="schedule-cal__select-arrow" aria-hidden="true">▾</span>
</span>
<span class="schedule-cal__select-wrap">
<select id="scheduleCalMonth" class="schedule-cal__select" aria-label="Month"></select>
<span class="schedule-cal__select-arrow" aria-hidden="true">▾</span>
</span>
<button id="scheduleCalSave" type="button" class="schedule-cal__save">Save</button>
</div>
<div id="scheduleCalGrid" class="schedule-cal__grid"></div>
</div>
</aside>
</div>

<datalist id="scheduleShiftCodeList"></datalist>

<script type="module" src="../../src/app/entries/schedule.js"></script>
</body>
</html>
