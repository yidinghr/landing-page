<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首頁</title>
<link rel="stylesheet" href="../assets/css/i18n.css">
<link rel="stylesheet" href="../assets/css/home.css">
</head>
<body class="home-page dashboard-page">

<div class="dashboard-galaxy" aria-hidden="true">
  <canvas id="homeGalaxyCanvas" class="dashboard-galaxy__canvas"></canvas>
</div>

<main class="dashboard-shell">
  <div id="homeTopActions" class="dashboard-top-actions" aria-label="頂部操作"></div>

  <section class="dashboard-layout">
    <aside class="dashboard-sidebar">
      <div class="dashboard-profile">
        <button type="button" id="dashboardAvatarButton" class="dashboard-avatar-button" aria-label="更換頭像">
          <img id="dashboardAvatarImage" class="dashboard-avatar-image" src="../image/logoweb.png" alt="">
        </button>
        <input id="dashboardAvatarInput" class="dashboard-avatar-input" type="file" accept="image/*">

        <div class="dashboard-profile__meta">
          <p id="dashboardProfileRole" class="dashboard-profile__role">Admin</p>
          <h1 id="dashboardProfileName" class="dashboard-profile__name">YiDing Admin</h1>
        </div>
      </div>

      <nav id="homeMenu" class="dashboard-nav" aria-label="功能選單"></nav>

      <div class="dashboard-sidebar__footer">
        <button type="button" id="dashboardLogoutButton" class="dashboard-logout-button">退出登录</button>
      </div>
    </aside>

    <section class="dashboard-chat-card">
      <div class="dashboard-card__head">
        <div>
          <p id="dashboardChatEyebrow" class="dashboard-card__eyebrow">AI WORKSPACE</p>
          <h2 id="dashboardChatTitle" class="dashboard-card__title">AI 對話區</h2>
        </div>
        <span id="dashboardChatBadge" class="dashboard-card__badge">Coming Soon</span>
      </div>

      <div id="dashboardChatBody" class="dashboard-chat-body"></div>
    </section>

    <section class="dashboard-detail-card">
      <div class="dashboard-card__head dashboard-card__head--tight">
        <div>
          <p id="dashboardDetailEyebrow" class="dashboard-card__eyebrow">LIVE PANEL</p>
          <h2 id="dashboardDetailTitle" class="dashboard-card__title">控制面板</h2>
        </div>
      </div>

      <div id="dashboardDetailBody" class="dashboard-detail-body"></div>
    </section>
  </section>
</main>

<script type="module" src="../src/app/entries/dashboard.js"></script>

</body>
</html>
