<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弈鼎國際</title>
  <link rel="icon" type="image/png" href="image/logoweb.png" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/i18n.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>

<body class="login-page">
  <div id="loginPageTools" class="yd-page-tools" aria-label="Page tools"></div>
  <main class="login-stage">
    <section class="login-panel" aria-labelledby="login-title">
      <img src="image/logo.png" alt="弈鼎標誌" class="login-logo" />

      <h1 id="login-title" class="login-title">弈鼎</h1>

      <form class="auth-card" id="loginForm" action="#" method="post" autocomplete="off">
        <div class="auth-row">
          <label class="auth-label" for="account">帳號</label>
          <input
            id="account"
            name="account"
            type="text"
            class="auth-input"
            value=""
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="auth-row">
          <label class="auth-label" for="password">密碼</label>
          <input
            id="password"
            name="password"
            type="password"
            class="auth-input"
            value=""
            autocomplete="off"
          />
        </div>

        <div class="auth-row auth-row--split">
          <div class="auth-spacer" aria-hidden="true"></div>
          <button type="submit" class="auth-button auth-button--divider">登入</button>
          <button type="button" class="auth-button" id="registerButton">註冊</button>
        </div>
      </form>

      <p id="loginMessage" class="auth-message" aria-live="polite"></p>
    </section>
  </main>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
