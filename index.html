<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弈鼎國際</title>
  <link rel="icon" type="image/png" href="image/logoweb.png" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/i18n.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body class="login-page">
  <div id="loginPageTools" class="yd-page-tools" aria-label="Page tools"></div>
  <main class="login-stage">
    <section class="login-scene" aria-labelledby="login-title">
      <div class="login-scene__art" aria-hidden="true"></div>
      <div class="login-scene__lights" aria-hidden="true"></div>
      <div class="login-scene__stars" aria-hidden="true"></div>
      <section class="login-panel" aria-label="Login panel">
        <header class="login-brand-block">
          <p class="login-brand-block__cn">弈鼎國際</p>
          <p class="login-brand-block__en">Yi Ding International</p>
        </header>
        <form class="login-form" id="loginForm" action="#" method="post" autocomplete="off">
          <div class="login-field">
            <input id="account" name="account" type="text" class="login-input" placeholder="账号" autocomplete="username" spellcheck="false" />
          </div>
          <div class="login-field">
            <input id="password" name="password" type="password" class="login-input" placeholder="密码" autocomplete="current-password" />
          </div>
          <button type="submit" class="login-submit">登入</button>
        </form>
        <p id="loginMessage" class="login-message" aria-live="polite"></p>
        <button type="button" class="login-register-hidden" id="registerButton" aria-hidden="true" tabindex="-1">註冊</button>
      </section>
    </section>
  </main>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
