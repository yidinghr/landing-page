<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弈鼎國際</title>
  <link rel="icon" type="image/png" href="image/logoweb.png" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/i18n.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>

<body class="login-page">
  <div class="login-page-ambient login-page-ambient--left" aria-hidden="true"></div>
  <div class="login-page-ambient login-page-ambient--right" aria-hidden="true"></div>
  <div class="login-page-grid" aria-hidden="true"></div>

  <div id="loginPageTools" class="yd-page-tools" aria-label="Page tools"></div>

  <main class="login-stage">
    <section class="login-layout" aria-labelledby="login-title">
      <aside class="login-visual-panel" aria-label="YiDing brand showcase">
        <div class="login-visual-card">
          <div class="login-visual-card__glow" aria-hidden="true"></div>

          <header class="login-visual-brand">
            <span class="login-visual-brand__mark-wrap">
              <img src="image/logo.png" alt="弈鼎標誌" class="login-visual-brand__mark" />
            </span>
            <div class="login-visual-brand__copy">
              <span class="login-visual-brand__name">YiDing International</span>
              <span class="login-visual-brand__label">Internal Workspace</span>
            </div>
          </header>

          <div class="login-visual-center">
            <div class="login-dragon-orbit" aria-hidden="true">
              <span class="login-dragon-orbit__ring login-dragon-orbit__ring--outer"></span>
              <span class="login-dragon-orbit__ring login-dragon-orbit__ring--inner"></span>
              <span class="login-dragon-orbit__trail login-dragon-orbit__trail--outer"></span>
              <span class="login-dragon-orbit__trail login-dragon-orbit__trail--inner"></span>
              <span class="login-dragon-orbit__head login-dragon-orbit__head--outer"></span>
              <span class="login-dragon-orbit__head login-dragon-orbit__head--inner"></span>
              <span class="login-dragon-orbit__spark login-dragon-orbit__spark--1"></span>
              <span class="login-dragon-orbit__spark login-dragon-orbit__spark--2"></span>
              <span class="login-dragon-orbit__spark login-dragon-orbit__spark--3"></span>
            </div>

            <div class="login-visual-emblem">
              <img src="image/logo.png" alt="弈鼎標誌" class="login-logo" />
            </div>
          </div>

          <div class="login-visual-copy">
            <div class="login-visual-copy__lines" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <h1 id="login-title" class="login-title">弈鼎</h1>
            <p class="login-visual-copy__subheading">YiDing International</p>
            <p class="login-visual-copy__text">
              黑金風格內部管理入口，整合員工資料、班表、考勤與公司資訊。
            </p>
          </div>
        </div>
      </aside>

      <section class="login-form-panel" aria-label="Login panel">
        <div class="login-form-shell">
          <div class="login-mode-switch" aria-hidden="true">
            <button type="button" class="login-mode-switch__item is-active">Log In</button>
            <button type="button" class="login-mode-switch__item">YiDing</button>
          </div>

          <div class="login-panel-head">
            <p class="login-panel-kicker">YIDING INTERNAL ACCESS</p>
            <h2 class="login-panel-title">Welcome Back</h2>
            <p class="login-panel-note">請使用內部帳號與密碼登入系統。</p>
          </div>

          <form class="auth-card" id="loginForm" action="#" method="post" autocomplete="off">
            <div class="auth-field-group">
              <label class="auth-label" for="account">帳號</label>
              <input
                id="account"
                name="account"
                type="text"
                class="auth-input"
                value=""
                autocomplete="username"
                spellcheck="false"
              />
            </div>

            <div class="auth-field-group">
              <label class="auth-label" for="password">密碼</label>
              <input
                id="password"
                name="password"
                type="password"
                class="auth-input"
                value=""
                autocomplete="current-password"
              />
            </div>

            <button type="submit" class="auth-submit-button">登入</button>
          </form>

          <p id="loginMessage" class="auth-message" aria-live="polite"></p>
          <button type="button" class="login-register-hidden" id="registerButton" aria-hidden="true" tabindex="-1">註冊</button>
        </div>
      </section>
    </section>
  </main>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
