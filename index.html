<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弈鼎國際</title>
  <link rel="icon" type="image/png" href="image/logoweb.png" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/i18n.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body class="login-page">
  <div class="login-galaxy" aria-hidden="true">
    <canvas id="loginGalaxyCanvas" class="login-galaxy__canvas"></canvas>
  </div>

  <main class="login-stage">
    <section class="login-shell" aria-label="Yi Ding login workspace">
      <div class="login-layout">
        <section class="login-visual" aria-hidden="true">
          <div class="login-visual__frame">
            <div class="login-visual__art">
              <div class="login-visual__aura login-visual__aura--left"></div>
              <div class="login-visual__aura login-visual__aura--right"></div>

              <div class="login-orbit">
                <span class="login-orbit__ring login-orbit__ring--outer"></span>
                <span class="login-orbit__ring login-orbit__ring--inner"></span>

                <div class="login-system" aria-hidden="true">
                  <span class="login-system__halo"></span>
                  <span class="login-system__orbit-track login-system__orbit-track--1"></span>
                  <span class="login-system__orbit-track login-system__orbit-track--2"></span>
                  <span class="login-system__orbit-track login-system__orbit-track--3"></span>
                  <span class="login-system__orbit-track login-system__orbit-track--4"></span>

                  <div class="login-system__planet-orbit login-system__planet-orbit--mercury" data-radius-x="94" data-radius-y="62" data-speed="0.7" data-phase="0.4" data-depth="24">
                    <span class="login-system__planet login-system__planet--mercury"></span>
                  </div>

                  <div class="login-system__planet-orbit login-system__planet-orbit--mars" data-radius-x="136" data-radius-y="90" data-speed="0.48" data-phase="1.7" data-depth="34">
                    <span class="login-system__planet login-system__planet--mars"></span>
                  </div>

                  <div class="login-system__planet-orbit login-system__planet-orbit--earth" data-radius-x="184" data-radius-y="118" data-speed="0.34" data-phase="2.5" data-depth="46">
                    <span class="login-system__planet login-system__planet--earth"></span>
                  </div>

                  <div class="login-system__planet-orbit login-system__planet-orbit--saturn" data-radius-x="236" data-radius-y="154" data-speed="0.24" data-phase="0.95" data-depth="58">
                    <span class="login-system__planet login-system__planet--saturn"></span>
                  </div>

                  <div class="login-system__planet-orbit login-system__planet-orbit--neptune" data-radius-x="282" data-radius-y="184" data-speed="0.18" data-phase="3.5" data-depth="70">
                    <span class="login-system__planet login-system__planet--neptune"></span>
                  </div>

                  <div class="login-system__mark-wrap">
                    <img src="image/logo3d.png" alt="" class="login-visual__mark" />
                    <span class="login-system__spark login-system__spark--a"></span>
                    <span class="login-system__spark login-system__spark--b"></span>
                    <span class="login-system__spark login-system__spark--c"></span>
                  </div>
                </div>

                <div class="login-visual__dragon-orbit">
                  <div class="login-visual__dragon-rig">
                    <img src="image/login-dragon-cutout.png" alt="" class="login-visual__dragon" />
                    <span class="login-visual__dragon-eye"></span>
                    <span class="login-visual__dragon-breath"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="login-panel" aria-labelledby="login-title">
          <div class="login-panel__inner">
            <header class="login-panel__header">
              <div class="login-panel__brand-lockup">
                <img src="image/login-brand-cutout.png" alt="Yi Ding International" class="login-panel__brand-graphic" />
              </div>

              <h1 id="login-title" class="login-title login-visually-hidden">弈鼎</h1>
            </header>

            <form class="login-form" id="loginForm" action="#" method="post" autocomplete="off">
              <div class="login-field login-field--account">
                <label class="login-visually-hidden" for="account">账号</label>
                <input
                  id="account"
                  name="account"
                  type="text"
                  class="login-input"
                  value=""
                  placeholder="账号"
                  autocomplete="off"
                  spellcheck="false"
                />
              </div>

              <div class="login-field login-field--password">
                <label class="login-visually-hidden" for="password">密码</label>
                <input
                  id="password"
                  name="password"
                  type="password"
                  class="login-input"
                  value=""
                  placeholder="密码"
                  autocomplete="off"
                />
              </div>

              <button type="submit" class="login-submit">登录</button>
            </form>

            <p id="loginMessage" class="login-message" aria-live="polite"></p>
            <button type="button" class="login-register-hidden" id="registerButton" aria-hidden="true" tabindex="-1">注册</button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/login-galaxy.js"></script>
  <script src="assets/js/login-visual.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
