<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弈鼎國際</title>
  <link rel="icon" type="image/png" href="image/logoweb.png">
</head>

<body style="margin:0; overflow:hidden; background:#000000; font-family:'Microsoft YaHei','Microsoft YaHei UI',sans-serif;">
  <div
    style="
      min-height:100vh;
      background:#000000;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    "
  >
    <div
      style="
        width:100%;
        max-width:620px;
        display:flex;
        flex-direction:column;
        align-items:center;
        transform: translateY(-100px);
      "
    >
      <!-- logo -->
      <img
        src="image/logo.png"
        alt="弈鼎標誌"
        style="
          width:280px;
          height:auto;
          display:block;
          margin:0 0 10px 0;
        "
      />

      <!-- title -->
      <div
        style="
          color:#f4d51f;
          font-size:140px;
          font-weight:900;
          line-height:0.9;
          margin:0 0 34px 0;
          text-align:center;
        "
      >
        弈鼎
      </div>

      <!-- login box -->
      <form
        id="loginForm"
        action="#"
        method="post"
        autocomplete="off"
        style="
          width:510px;
          border:4px solid #f4d51f;
          box-sizing:border-box;
          background:#000000;
        "
      >
        <!-- row 1 -->
        <div
          style="
            display:grid;
            grid-template-columns:155px 1fr;
            min-height:50px;
            border-bottom:2px solid #f4d51f;
          "
        >
          <div
            style="
              border-right:2px solid #f4d51f;
              color:#f4d51f;
              font-size:25px;
              font-weight:900;
              display:flex;
              align-items:center;
              justify-content:center;
              background:#000000;
              font-family:'Microsoft YaHei','Microsoft YaHei UI',sans-serif;
            "
          >
            帳號
          </div>

          <input
            id="account"
            name="account"
            type="text"
            value=""
            autocomplete="off"
            spellcheck="false"
            style="
              width:100%;
              height:100%;
              min-height:50px;
              background:#000000;
              border:none;
              outline:none;
              color:#f4d51f;
              font-size:25px;
              padding:0 14px;
              box-sizing:border-box;
              font-family:'Microsoft YaHei','Microsoft YaHei UI',sans-serif;
            "
          />
        </div>

        <!-- row 2 -->
        <div
          style="
            display:grid;
            grid-template-columns:155px 1fr;
            min-height:50px;
            border-bottom:2px solid #f4d51f;
          "
        >
          <div
            style="
              border-right:2px solid #f4d51f;
              color:#f4d51f;
              font-size:25px;
              font-weight:900;
              display:flex;
              align-items:center;
              justify-content:center;
              background:#000000;
              font-family:'Microsoft YaHei','Microsoft YaHei UI',sans-serif;
            "
          >
            密碼
          </div>

          <input
            id="password"
            name="password"
            type="password"
            value=""
            autocomplete="off"
            style="
              width:100%;
              height:100%;
              min-height:50px;
              background:#000000;
              border:none;
              outline:none;
              color:#f4d51f;
              font-size:25px;
              padding:0 14px;
              box-sizing:border-box;
              font-family:'Microsoft YaHei','Microsoft YaHei UI',sans-serif;
            "
          />
        </div>

        <!-- row 3 -->
        <div
          style="
            display:grid;
            grid-template-columns:155px 1fr 1fr;
            min-height:50px;
          "
        >
          <div
            style="
              border-right:2px solid #f4d51f;
              background:#000000;
            "
          ></div>

          <button
            type="submit"
            onmouseover="this.style.background='#2a2a2a'"
            onmouseout="this.style.background='#000000'"
            style="
              background:#000000;
              border:none;
              border-right:2px solid #f4d51f;
              color:#f4d51f;
              font-size:25px;
              font-weight:900;
              cursor:pointer;
              transition:background 0.15s ease;
              font-family:'Microsoft YaHei','Microsoft YaHei UI',sans-serif;
            "
          >
            登入
          </button>

          <button
            id="registerButton"
            type="button"
            onmouseover="this.style.background='#2a2a2a'"
            onmouseout="this.style.background='#000000'"
            style="
              background:#000000;
              border:none;
              color:#f4d51f;
              font-size:25px;
              font-weight:900;
              cursor:pointer;
              transition:background 0.15s ease;
              font-family:'Microsoft YaHei','Microsoft YaHei UI',sans-serif;
            "
          >
            註冊
          </button>
        </div>
      </form>

      <p
        id="loginMessage"
        aria-live="polite"
        style="
          min-height:28px;
          margin:14px 0 0 0;
          color:#fff3a0;
          font-size:18px;
          font-weight:700;
          text-align:center;
        "
      ></p>
    </div>
  </div>
  <script src="assets/js/login.js"></script>
</body>
</html>
