<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弈鼎國際</title>
  <link rel="icon" type="image/png" href="image/logoweb.png" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/i18n.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>

<body class="login-page">
  <div class="login-page-grid" aria-hidden="true"></div>
  <div class="login-page-glow login-page-glow--left" aria-hidden="true"></div>
  <div class="login-page-glow login-page-glow--right" aria-hidden="true"></div>

  <div id="loginPageTools" class="yd-page-tools" aria-label="Page tools"></div>

  <main class="login-stage">
    <section class="login-shell" aria-labelledby="login-title">
      <div class="login-shell__border" aria-hidden="true"></div>

      <header class="login-hero">
        <div class="login-hero__logo-wrap">
          <span class="login-hero__logo-halo" aria-hidden="true"></span>
          <img src="image/logo.png" alt="弈鼎標誌" class="login-logo" />
        </div>

        <div class="login-brand-copy">
          <p class="login-eyebrow">YIDING INTERNAL WORKSPACE</p>
          <h1 id="login-title" class="login-title">弈鼎</h1>
          <img src="image/logoweb.png" alt="弈鼎國際 YiDing International" class="login-wordmark" />
          <p class="login-panel-subtitle">黑金風格內部管理入口，保留現有系統邏輯，只重做登入頁面的版面與質感。</p>
        </div>

        <div class="login-chip-row" aria-hidden="true">
          <span class="login-chip">INTERNAL</span>
          <span class="login-chip">SECURE</span>
          <span class="login-chip">DASHBOARD</span>
        </div>
      </header>

      <section class="login-form-panel" aria-label="Login panel">
        <div class="login-form-shell">
          <div class="login-panel-head">
            <p class="login-panel-kicker">控制台登入</p>
            <h2 class="login-panel-title">登入系統</h2>
            <p class="login-panel-note">請使用內部帳號與密碼登入首頁主控台。</p>
          </div>

          <form class="auth-card" id="loginForm" action="#" method="post" autocomplete="off">
            <div class="auth-field-group">
              <label class="auth-label" for="account">帳號</label>
              <input
                id="account"
                name="account"
                type="text"
                class="auth-input"
                value=""
                autocomplete="username"
                spellcheck="false"
              />
            </div>

            <div class="auth-field-group">
              <label class="auth-label" for="password">密碼</label>
              <input
                id="password"
                name="password"
                type="password"
                class="auth-input"
                value=""
                autocomplete="current-password"
              />
            </div>

            <button type="submit" class="auth-submit-button">登入</button>
          </form>

          <p id="loginMessage" class="auth-message" aria-live="polite"></p>
          <button type="button" class="login-register-hidden" id="registerButton" aria-hidden="true" tabindex="-1">註冊</button>
        </div>
      </section>
    </section>
  </main>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
