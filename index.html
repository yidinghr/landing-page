<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弈鼎國際</title>
  <link rel="icon" type="image/png" href="image/logoweb.png" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/i18n.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body class="login-page">
  <div class="login-galaxy" aria-hidden="true"></div>
  <div id="loginPageTools" class="yd-page-tools" aria-label="Page tools"></div>

  <main class="login-stage">
    <section class="login-shell" aria-label="Yi Ding login workspace">
      <div class="login-layout">
        <section class="login-visual" aria-hidden="true">
          <div class="login-visual__frame">
            <div class="login-visual__art">
              <div class="login-visual__aura login-visual__aura--left"></div>
              <div class="login-visual__aura login-visual__aura--right"></div>

              <div class="login-orbit">
                <span class="login-orbit__ring login-orbit__ring--outer"></span>
                <span class="login-orbit__ring login-orbit__ring--inner"></span>
                <span class="login-orbit__sun"></span>
                <img src="image/logo.png" alt="" class="login-visual__mark" />
                <div class="login-visual__dragon-orbit">
                  <img src="image/login-dragon-cutout.png" alt="" class="login-visual__dragon" />
                </div>
              </div>
            </div>

            <img src="image/login-brand-cutout.png" alt="" class="login-visual__brand-image" />
          </div>
        </section>

        <section class="login-panel" aria-labelledby="login-title">
          <div class="login-panel__inner">
            <header class="login-panel__header">
              <div class="login-panel__brand">
                <img src="image/logo.png" alt="弈鼎標誌" class="login-logo" />
                <div class="login-panel__brand-copy">
                  <p class="login-panel__brand-cn">弈鼎国际</p>
                  <p class="login-panel__brand-en">Yi Ding International</p>
                </div>
              </div>

              <h1 id="login-title" class="login-title login-visually-hidden">弈鼎</h1>
              <h2 class="login-panel__welcome">欢迎回来</h2>
              <p class="login-panel__desc">请输入内部账号和密码登录</p>
            </header>

            <form class="login-form" id="loginForm" action="#" method="post" autocomplete="off">
              <div class="login-field login-field--account">
                <label class="login-visually-hidden" for="account">账号</label>
                <input
                  id="account"
                  name="account"
                  type="text"
                  class="login-input"
                  value=""
                  placeholder="账号"
                  autocomplete="off"
                  spellcheck="false"
                />
              </div>

              <div class="login-field login-field--password">
                <label class="login-visually-hidden" for="password">密码</label>
                <input
                  id="password"
                  name="password"
                  type="password"
                  class="login-input"
                  value=""
                  placeholder="密码"
                  autocomplete="off"
                />
              </div>

              <button type="submit" class="login-submit">登录</button>
            </form>

            <div class="login-panel__meta" aria-hidden="true">
              <span class="login-panel__meta-item login-panel__meta-item--shield">安全登录</span>
              <span class="login-panel__meta-item login-panel__meta-item--orbit">环球系统</span>
            </div>

            <p id="loginMessage" class="login-message" aria-live="polite"></p>
            <button type="button" class="login-register-hidden" id="registerButton" aria-hidden="true" tabindex="-1">注册</button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
